<div class="root">
  <div class="root__field">
    <div class="field__svg">
      <ng-container *ngComponentOutlet="SvgSearch" />
    </div>

    <input
      class="field__input"
      [type]="field().type"
      [formControl]="ctrl()"
      [placeholder]="field().label"
      [autocomplete]="'off'"
    />
  </div>

  <div class="root__err">
    <span>{{ errMsg() }}</span>
  </div>
</div>

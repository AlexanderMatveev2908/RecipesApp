<form class="root">
  <div class="root__checkboxes">
    <app-checkbox-input
      label="Max Prep Time"
      [optionsCheckbox]="SearchRecipesUiFct.optionsPrepTime"
      [ctrl]="getCtrl('maxPrepTime')"
    />
    <app-checkbox-input
      label="Max Cook Time"
      [optionsCheckbox]="SearchRecipesUiFct.optionsCookTime"
      [ctrl]="getCtrl('maxCookTime')"
    />
  </div>

  <app-txt-input [ctrl]="getCtrl('nameDish')" [field]="SearchRecipesUiFct.searchField" />
</form>

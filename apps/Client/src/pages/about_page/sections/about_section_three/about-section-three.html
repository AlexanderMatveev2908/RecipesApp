<div class="root">
  <span class="text-neutral__900 txt__5">Our food philosophy</span>

  <div class="root__points">
    @for (item of AboutSectionThreeData.data; track item.id) {
      <div class="points__item">
        <div class="item__svg">
          <ng-container *ngComponentOutlet="SvgRight" />
        </div>

        <div class="item__content">
          <span class="txt__7 text-neutral__900">{{ item.title }}</span>
          <span class="txt__8 text-neutral__600">{{ item.description }}</span>
        </div>
      </div>
    }
  </div>
</div>

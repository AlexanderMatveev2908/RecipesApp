<div class="root">
  <div class="root__slogan txt__3">
    <span class="slogan__healthy"> Healthy&nbsp;</span>
    <span> meals, zero fuss </span>
  </div>

  <span class="root__description txt__8"
    >Discover eight quick, whole-food recipes that you can cook tonight—no processed junk, no
    guesswork.</span
  >

  <div class="root__explore">
    <a>
      <span class="txt__6 text-white"> Start exploring </span>
    </a>
  </div>

  <div class="root__img">
    <div class="img__wrapper">
      <app-img-loading src="/images/girl_cooking.png" />
    </div>

    <div class="img__bg_svg">
      <ng-container *ngComponentOutlet="SvgBgBlueWave" />
    </div>
  </div>
</div>
